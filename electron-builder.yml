appId: com.execd.app
productName: Execd
copyright: Copyright © 2026 Execd

directories:
  buildResources: resources
  output: dist

files:
  - out/**
  - resources/**
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{CONTRIBUTING.md,PROJECT_STRUCTURE.md}'
  - '!screenshots/**'
  - '!.github/**'
  - '!.vscode/**'
  - '!.claude/**'
  - '!.code-review-graph/**'

asarUnpack:
  - resources/**

win:
  executableName: Execd
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  artifactName: Execd-Setup-${version}.exe
  shortcutName: Execd
  uninstallDisplayName: Execd
  createDesktopShortcut: always
  createStartMenuShortcut: true
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  icon: resources/icon.png
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  target:
    - target: dmg
      arch:
        - x64
        - arm64

dmg:
  artifactName: Execd-${version}.dmg

linux:
  target:
    - AppImage
    - deb
  maintainer: yagnesh.khamar@appunik.com
  category: Utility
  icon: resources/icon.png

appImage:
  artifactName: Execd-${version}.${ext}

npmRebuild: false

publish:
  provider: github
  owner: YagneshKhamar
  repo: execd
